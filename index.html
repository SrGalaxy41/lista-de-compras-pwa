<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista Inteligente</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E7D32">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2E7D32',
                        offwhite: '#F7F9FC',
                        accent: '#6A1B9A',
                        danger: '#D32F2F',
                    }
                }
            }
        }
    </script>
    <!-- jsPDF & Tesseract -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        .swipe-container { overflow: hidden; position: relative; }
        .swipe-content { transition: transform 0.3s ease; }
        .item-checked { text-decoration: line-through; opacity: 0.6; }
        [contenteditable]:focus { outline: none; background: #f3f4f6; border-radius: 4px; }
    </style>
</head>
<body class="bg-offwhite text-gray-800 font-sans pb-24">

    <!-- Sticky Header -->
    <header class="bg-primary text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto space-y-3">
            <input type="text" id="searchInput" placeholder="Buscar na lista..." 
                class="w-full p-3 rounded-lg text-gray-800 focus:ring-2 focus:ring-green-300 border-none outline-none">
            
            <div class="bg-black/10 p-3 rounded-lg space-y-1">
                <div class="flex items-center gap-2 text-sm">
                    <span>Saldo: R$</span>
                    <input type="number" id="budgetInput" step="0.01" value="0.00" 
                        class="bg-transparent border-b border-white w-20 font-bold outline-none text-center">
                </div>
                <div class="flex justify-between font-medium">
                    <span>Total: R$ <span id="totalDisplay">0.00</span></span>
                    <span id="remainingBalance" class="text-green-200">Restante: R$ 0.00</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <!-- Add Item Form -->
        <section id="addItemSection" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <form id="addItemForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="itemName" placeholder="Produto" list="catalogList" required
                        class="col-span-2 p-3 bg-gray-50 rounded-lg border border-gray-200 focus:border-primary outline-none">
                    <datalist id="catalogList"></datalist>
                    
                    <input type="text" id="itemCategory" placeholder="Categoria"
                        class="p-3 bg-gray-50 rounded-lg border border-gray-200 outline-none">
                    
                    <div class="flex items-center bg-gray-50 rounded-lg border border-gray-200 overflow-hidden">
                        <button type="button" id="minusQty" class="px-3 py-2 hover:bg-gray-100 font-bold">-</button>
                        <input type="number" id="itemQty" value="1" min="1" class="w-full text-center bg-transparent outline-none">
                        <button type="button" id="plusQty" class="px-3 py-2 hover:bg-gray-100 font-bold">+</button>
                    </div>
                    
                    <input type="number" id="itemPrice" placeholder="Preço R$" step="0.01"
                        class="col-span-2 p-3 bg-gray-50 rounded-lg border border-gray-200 outline-none">
                </div>
                <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-bold shadow-lg active:scale-[0.98] transition-transform">
                    Adicionar à Lista
                </button>
            </form>
        </section>

        <!-- List Section -->
        <section id="listSection">
            <div id="activeList" class="space-y-3">
                <!-- Items here -->
            </div>
        </section>
    </main>

    <!-- FAB Scanner -->
    <label for="scanInput" class="fixed bottom-24 right-6 bg-accent text-white p-4 rounded-full shadow-2xl cursor-pointer active:scale-90 transition-transform z-40">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 011.664.89l.812 1.22A2 2 0 0010.07 10H19a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <input type="file" id="scanInput" accept="image/*" capture="environment" class="hidden">
    </label>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full bg-white flex justify-around p-3 border-t border-gray-200 shadow-2xl z-50">
        <button id="showListBtn" class="flex flex-col items-center text-primary font-medium">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            <span class="text-xs">Lista</span>
        </button>
        <button id="loadTemplateBtn" class="flex flex-col items-center text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>
            <span class="text-xs">Modelos</span>
        </button>
        <button id="historyBtn" class="flex flex-col items-center text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span class="text-xs">Histórico</span>
        </button>
        <button id="sharePdfBtn" class="flex flex-col items-center text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
            <span class="text-xs">PDF</span>
        </button>
    </nav>

    <!-- Modals -->
    <div id="modalOverlay" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-t-2xl sm:rounded-2xl max-h-[80vh] flex flex-col overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h2 id="modalTitle" class="font-bold text-lg">Título</h2>
                <button id="closeModal" class="p-2 text-gray-400 hover:text-gray-600">✕</button>
            </div>
            <div id="modalContent" class="overflow-y-auto p-4 flex-grow"></div>
        </div>
    </div>

    <!-- Hidden Canvas -->
    <canvas id="ocrCanvas" class="hidden"></canvas>
    
    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-32 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm shadow-2xl z-[110] transition-opacity duration-300"></div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    </script>
</body>
</html>
